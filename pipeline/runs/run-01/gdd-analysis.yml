open_questions:
  - id: q-game-name
    question: "What is the game slug (folder name under src/game/)?"
    context: "GDD title is 'Mystery Munchies: Scooby's Bubble Pop'. Slug candidates: mysterymunchies, mystery-munchies, scooby-bubblepop. Plan must resolve this to substitute <game-root>."
    options: ["mysterymunchies", "mystery-munchies"]

  - id: q-hand-crafted-level-format
    question: "What is the exact JSON schema for hand-crafted level files (level-001.json through level-015.json)?"
    context: "GDD specifies files live in src/game/<slug>/data/levels/hand-crafted/ but does not define the JSON schema. Level generator output shape and level loader must agree on schema."
    options: []

  - id: q-continue-system-ad-integration
    question: "Is ad integration (Watch Ad → +5 taps) in scope for core pass?"
    context: "GDD specifies 'Watch a Short Clip' as a loss-continuation option. Ad SDK integration is typically outside a core game pass. If out of scope, the button must exist but be non-functional (stub is a guardrail #15 violation — must clarify)."
    options: ["stub-disabled-btn-with-note", "full-ad-integration", "omit-for-core-pass"]

  - id: q-scooby-snack-currency
    question: "Is the Scooby Snack in-game currency wallet (token collection, spend on +5 taps) in scope for core pass?"
    context: "GDD describes floating bone biscuit tokens collectible within 3 seconds post-combo, plus spending them for continues. Persistence and wallet state are meta/progression concerns. Core pass may implement the visual token without currency persistence."
    options: ["visual-only-no-wallet", "full-wallet-core-pass", "defer-to-meta-pass"]

