# ─────────────────────────────────────────────────────────────────────────────
# RISK AREAS
# ─────────────────────────────────────────────────────────────────────────────

risk_areas:
  - feature: game-controller-pixi
    reason: "Central integration point — all GPU rendering, ECS wiring, input routing, and layer management converge here. Every downstream feature depends on this being correct first."

  - feature: bubble-grid
    reason: "Viewport layout owner — 8×10 grid defines the canvas budget. Affects HUD placement, companion placement, and the 44pt tap-target floor. Changes here cascade to all renderers."

  - feature: cluster-pop-mechanic
    reason: "Primary interaction — the one gesture the entire game is built on. Input blocking, animation lock, queue vs ignore, and solvability all depend on correct state management here."

  - feature: win-loss-sequences
    reason: "Strictly ordered 8–10-step animation sequences across multiple renderers. ECS state transitions must match lifecycle.md board states. Board preservation for loss continuation is cross-cutting."

  - feature: level-generation
    reason: "Touches grid dimensions, blocker placement, color distribution, solvability simulation, and fallback handling. Seeded RNG must not use Math.random(). 7-step pipeline with retry logic."

