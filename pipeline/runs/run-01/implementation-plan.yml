        should: "clue-layer background behind that cell becomes visible; partial parchment art shows"
      - given: "level ends before all clue rows are cleared"
        should: "results screen shows clue at 30% opacity with 'Keep Playing to Reveal' prompt"
      # canvas CoS: visual distinctiveness for new entity types
      - given: "Ghost Barrier, Crate Blocker, and normal bubbles are all on the board"
        should: "all three are distinguishable from a screenshot — each has a unique visual cue (color, icon, and shape distinct from normal bubbles)"
