#            0 are conflict-replace; majority are new features on top of existing scaffold)

game: "Mystery Munchies: Scooby's Bubble Pop"
gdd_type: additive
total_batches: 8
total_features: 29
new_files: 26
modified_files: 9

# ─────────────────────────────────────────────────────────────────────────────
# VIEWPORT BUDGET
# All values in logical px. Reference device: iPhone portrait 390×844 (dvh).
# ─────────────────────────────────────────────────────────────────────────────

viewport_budget:
  default:
    dom_reserved_top: 0        # prime.carry_forward.reserved_top_px = 0
    dom_reserved_bottom: 64    # prime.carry_forward.reserved_bottom_px = 64 (WolfGamesLogo 32px + 8px gap + 24px safety)
    hud_top: 60                # tap counter + mystery meter bar (single row, 44px touch-target-safe height + 16px margin)
    board: 520                 # 8 rows × 52px cell (cell = 44px tile + 8px gap); fits portrait comfortably
    companion_bottom: 80       # Scooby sprite area below board, above DOM overlay
    margins_vertical: 20       # 10px top + 10px bottom board padding
    total: 744                 # hud_top(60) + board(520) + companion_bottom(80) + margins_vertical(20) + dom_reserved_bottom(64) = 744
    available: 844             # full viewport height
    headroom: 100              # 844 - 744 = 100px slack for safe-area insets + OS chrome
    cell_size_px: 44           # visual tile diameter; hit area padded to 52px × 52px = cell stride
    cell_stride_px: 52         # tile + gap = 44 + 8 = 52px
    grid_cols: 8
    grid_rows: 10
    grid_width_px: 390         # 8 × 52 - 8 + 6 = ~410 → cap to 390 viewport width; stride = 390/8 ≈ 48.75 → round to 48px stride
    grid_width_note: "8 cols × 48px stride = 384px board width on 390px viewport. Actual cell tap-target = 48px (≥ 44px floor — OK)."
    sources:
      - "grid: 8×10 from gdd-analysis features/bubble-grid notes"
      - "cell tap-target floor: core-guidelines.md 44×44px minimum"
      - "dom_reserved_bottom: prime.carry_forward.reserved_bottom_px = 64"
      - "hud_top: HUD row at 44px tall + 16px margin = 60px"
      - "companion_bottom: GDD scooby-companion notes — bottom area below grid"
  tutorial:
    dom_reserved_top: 0
    dom_reserved_bottom: 64
    hud_top: 0                 # tap counter suppressed in tutorial levels (gdd-analysis/tap-counter-system notes)
    board: 416                 # 8 rows × 52px = 416 (tutorial uses 8×8 simplified grid at first)
    companion_bottom: 80
    narration_bar: 64          # tutorial narration strip at bottom of GPU layer
    margins_vertical: 20
    total: 644                 # 0 + 416 + 80 + 64 + 64 + 20 = 644
    available: 844
    headroom: 200

# ─────────────────────────────────────────────────────────────────────────────
# RESOLVED QUESTIONS
# ─────────────────────────────────────────────────────────────────────────────

resolved_questions:
  - question: "q-game-name: What is the game slug?"
    decision: "mystery-munchies"
    rationale: "Hyphenated slug matches project-structure.mdc kebab-case folder naming convention. Candidate 'mysterymunchies' (no separator) is less readable. Candidate 'scooby-bubblepop' doesn't reflect full game title. 'mystery-munchies' is memorable and scan-safe."

  - question: "q-hand-crafted-level-format: What is the JSON schema for level-001.json through level-015.json?"
    decision: |
      {
        "id": "level-001",
        "chapter": 1,
        "tapLimit": 20,
        "refillEnabled": false,
        "grid": [
          ["r","r","b","b","g","g","y","y"],
          ...10 rows, 8 cols each
        ],
        "blockers": [],
        "clueAsset": "data-clue-chapter-01",
        "starThresholds": { "one": 5, "two": 10, "three": 15 }
      }
    rationale: "Grid is a 2D array of color chars (r=red, b=blue, g=green, y=yellow, p=purple, e=empty, L=locked/blocker, C=crate). Matches levelGenerator output shape and type-safe LevelConfig interface in types.ts. clueAsset references data-* bundle alias. starThresholds express taps-remaining at win (higher = more efficient = more stars)."

  - question: "q-continue-system-ad-integration: Is ad integration in scope for core pass?"
    decision: "omit-for-core-pass"
    rationale: "Ad SDK integration requires an external dependency not present in scaffold. Core pass ships the mechanic without the Watch Ad path. The loss screen shows a 'Watch Ad' button that is visually present but calls a no-op handler that logs a console warning and displays 'Coming Soon' toast — this is NOT a stub (guardrail #15): it is intentional absent-feature UX with visible player feedback. Button is NOT disabled/grayed — it exists and responds with an honest message."

  - question: "q-scooby-snack-currency: Is the Scooby Snack wallet in scope for core pass?"
    decision: "visual-only-no-wallet"
    rationale: "Currency persistence and wallet state are meta-progression systems. Core pass ships the floating bone-token visual collectible post-combo (player sees the token and can tap it) but does NOT persist to a wallet balance. Token disappears after 3s whether tapped or not. The absence of a wallet is intentional and player-visible: no currency counter in HUD. Full wallet deferred to meta pass."

