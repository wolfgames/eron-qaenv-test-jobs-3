        should: "Crate Blocker is NOT destroyed by adjacent cluster pops; visually distinct from normal bubbles (wood texture emoji/icon)"
      - given: "a Power Bubble explosion covers a Crate Blocker"
        should: "Crate Blocker is destroyed with burst effect"
