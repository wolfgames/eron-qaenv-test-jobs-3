# ─────────────────────────────────────────────────────────────────────────────
# BATCHES
# ─────────────────────────────────────────────────────────────────────────────

batches:

  # ═══════════════════════════════════════════════════════════════════════════
  # BATCH 1 — P0 — Foundation: ECS Plugin + Game Controller + Pixi Init
  # Hook batch: player sees a blank-but-rendering GPU canvas with HUD skeleton.
  # This IS the hook batch because every P0 downstream feature is blocked without it.
  # "First 30 seconds" goal: B1 enables B2 which delivers the actual board — B1+B2
  # together must complete before a player session is meaningful. B1 is pre-rewarding
  # infrastructure but cannot be deferred per dependency topology (hook_batch = 2).
  # ═══════════════════════════════════════════════════════════════════════════
  - id: 1
    name: "Foundation — ECS plugin + GameController + Pixi bootstrap"
    priority: P0
    player_visible: "player sees a black GPU canvas launch (no board yet); the game container loads without crash; GPU canvas replaces the DOM stub"
    features:
      - ecs-plugin
      - game-controller-stub-conflict
      - game-controller-pixi
      - tuning-game-specific
      - asset-bundle-game
    cos_covered: [core-interaction, animated-dynamics, canvas, scoring]
    ux_zones:
      thumb_zone: [center]
      touch_targets: [board-grid]
      feedback_surfaces: [gpu-canvas]
    acceptance:
      # ecs-plugin
      - given: "GamePlugin is instantiated and a Database is created from it"
        should: "resources score, tapsRemaining, starsEarned, mysteryMeterProgress, boardPhase, level, chapter, clearedCells, totalNonBlockerCells are present with correct initial values"
      - given: "plugin property order is checked at runtime"
        should: "extends → services → components → resources → archetypes → computed → transactions → actions → systems — no order violation thrown"
      # game-controller-stub-conflict + game-controller-pixi
      - given: "setupGame(deps) is called by the scaffold"
        should: "Pixi Application initializes (not DOM div); bg, board, hud, ui layers are created; setActiveDb(db) and bridgeEcsToSignals are called; pointertap listener is registered on the stage"
      - given: "the game container mounts"
        should: "touch-action:none is applied to the GPU canvas container (mobile-constraints rule)"
      # tuning-game-specific
      - given: "GAME_DEFAULTS is imported from gameTuning.ts"
        should: "popDuration, fallDuration, refillDuration, chainMax, popBasePts, chainMultiplierBase, powerBubbleBonus, starThresholds, and difficultyTable keys are all defined with numeric or object values"
      # asset-bundle-game
      - given: "asset-manifest.ts is loaded"
        should: "bundles scene-bubbles, scene-blockers, scene-ui, fx-pop, fx-power, audio-sfx-mysterymunchies, audio-music-mysterymunchies, data-levels are declared with correct scene-*/fx-*/audio-*/data-* prefixes (no theme-* prefix for GPU assets)"
    test_loci:
      - describe: "ecs-plugin: resource initialization"
        file: "tests/mystery-munchies/ecs-plugin.test.ts"
        cases:
          - "resources present with initial values"
          - "plugin property order correct"
      - describe: "game-controller: pixi bootstrap"
        file: "tests/mystery-munchies/game-controller.test.ts"
        cases:
          - "setupGame returns GameController without DOM elements"
          - "setActiveDb called on init"
          - "pointertap listener registered"
      - describe: "tuning: game defaults"
        file: "tests/mystery-munchies/tuning.test.ts"
        cases:
          - "GAME_DEFAULTS keys all defined"
      - describe: "asset-manifest: bundle prefixes"
        file: "tests/mystery-munchies/asset-manifest.test.ts"
        cases:
          - "GPU asset bundles use scene-* or fx-* prefix"
          - "audio bundles use audio-* prefix"
    files:
      state:
        - src/game/mystery-munchies/state/GamePlugin.ts
        - src/game/mystery-munchies/state/types.ts
        - src/game/mystery-munchies/tuning/gameTuning.ts
        - src/game/tuning/types.ts
      integration:
        - src/game/mystery-munchies/GameController.ts
        - src/game/mystery-munchies/index.ts
        - src/game/asset-manifest.ts
      test:
        - tests/mystery-munchies/ecs-plugin.test.ts
        - tests/mystery-munchies/game-controller.test.ts
        - tests/mystery-munchies/tuning.test.ts
        - tests/mystery-munchies/asset-manifest.test.ts
    how:
      - "Create GamePlugin.ts with all resources, components (cellKind, cellColor, cellRow, cellCol, blockerHits), archetypes (Block), and skeleton transactions/actions. Plugin property order enforced: extends→services→components→resources→archetypes→computed→transactions→actions→systems."
      - "Replace src/game/mystery-munchies/GameController.ts DOM stub implementation with Pixi Application init, layer creation (bg/board/hud/ui as Containers), ECS wiring (setActiveDb → bridgeEcsToSignals), and pointertap dispatch. Preserve exported setupGame(deps) contract."
      - "Extend src/game/asset-manifest.ts with game-specific bundles using scene-*/fx-*/audio-*/data-* prefixes only."
    risk: HIGH
    risk_reason: "Central integration point — ECS wiring, Pixi bootstrap, and layer management all converge. If setActiveDb or bridgeEcsToSignals wiring is wrong, every downstream batch breaks. Rollback: preserve original gameController.ts as gameController.dom-backup.ts before replacing."
    definition_of_done:
      - "acceptance[] tests go red then green"
      - "integration call site exists at files.integration (GameController.ts exports setupGame)"
      - "every file in files.integration is exercised by at least one acceptance test"
      - "CoS sub-walk clean for cos_covered: Pixi Application initialized, ECS DB created, no DOM in game code"
      - "touch-action:none applied on GPU canvas container"
      - "no <game-root> or mygame literal in any created file"
      - "bun run build + bun run test:run pass within 3 fix cycles"

  # ═══════════════════════════════════════════════════════════════════════════
  # BATCH 2 — P0 — Bubble Grid + Board Renderer (HOOK BATCH)
  # hook_batch = 2. Player sees colored bubbles in an 8×10 grid they can look at.
  # ═══════════════════════════════════════════════════════════════════════════
  - id: 2
    name: "Bubble grid — 8×10 layout, BubbleRenderer, tap-target floor"
    priority: P0
    player_visible: "player sees a full 8×10 grid of colored bubbles on the GPU canvas; bubbles fill the center of the portrait viewport; each bubble is large enough to tap distinctly"
    features:
      - bubble-grid
    cos_covered: [canvas, core-interaction, animated-dynamics]
    ux_zones:
      thumb_zone: [center]
      touch_targets: [board-cell]
      feedback_surfaces: [board, bubbles]
    acceptance:
      - given: "BoardRenderer is initialized with viewport 390×844"
        should: "8×10 grid renders with cell stride ≥ 48px (tap target ≥ 44px) and board width ≤ 390px"
      - given: "five bubble colors (red, blue, green, yellow, purple) are placed on the grid"
        should: "each color is visually distinct at a glance — emoji or tinted circle fallback, each with a unique label/icon so colorblind players can distinguish them"
      - given: "a bubble cell is present"
        should: "its visible area is ≥ 48×48px (canvas CoS minimum piece size)"
      - given: "the board renders at 390×844 viewport"
        should: "HUD top area (60px), board (board height), companion area (80px), and DOM overlay (64px) do not overlap"
      - given: "a cell in the bottom rows (rows 7–10) is empty"
        should: "the clue-layer background is visible beneath the grid (foundation for clue-fragment)"
    test_loci:
      - describe: "board-renderer: grid layout and tap targets"
        file: "tests/mystery-munchies/board-renderer.test.ts"
        cases:
          - "cell stride >= 48px at 390px viewport"
          - "board width <= viewport width"
          - "all 5 bubble colors visually distinct"
          - "piece visible area >= 48x48px"
          - "no HUD/board/companion overlap at 390x844"
    files:
      state:
        - src/game/mystery-munchies/state/GamePlugin.ts
      integration:
        - src/game/mystery-munchies/renderers/BoardRenderer.ts
        - src/game/mystery-munchies/renderers/BubbleRenderer.ts
        - src/game/mystery-munchies/GameController.ts
      test:
        - tests/mystery-munchies/board-renderer.test.ts
    how:
      - "Create BoardRenderer.ts: init(data, viewportW, viewportH) places 8×10 bubble sprites using cell stride = floor(viewportW / 8). Bottom rows 7–10 render a semi-transparent clue backing layer."
      - "Create BubbleRenderer.ts: renders individual bubble sprites from scene-bubbles atlas; fallback = emoji circle (🔴🔵🟢🟡🟣) with colored tint so each type is distinguishable without real assets."
      - "GameController.init() calls boardRenderer.init() after Pixi app.init() resolves; reads board state from ECS archetypes."
    risk: HIGH
    risk_reason: "Viewport layout owner — cell sizing, gap, and HUD placement cascade to all renderers. If cell stride is wrong, the 44pt floor is violated and touch targets fail. Verify: render at 390×844 and 375×667 to confirm no overflow."
    definition_of_done:
      - "acceptance[] tests go red then green"
      - "integration call site exists: GameController.init() calls boardRenderer.init()"
      - "every file in files.integration is exercised by at least one acceptance test"
      - "CoS sub-walk clean: piece size ≥ 48×48px, all colors visually distinct, no overlap at 390×844"
      - "touch targets ≥ 44px and feedback surfaces (board, bubbles) present"
      - "screen root elements consume reserved_top_px=0 / reserved_bottom_px=64 as padding"
      - "bun run build + bun run test:run pass within 3 fix cycles"

  # ═══════════════════════════════════════════════════════════════════════════
  # BATCH 3 — P0 — Core Interaction: Cluster Pop + Tap Counter
  # Primary interaction: tap a cluster → flood-fill → pop. First rewarding action.
  # ═══════════════════════════════════════════════════════════════════════════
  - id: 3
    name: "Core interaction — cluster pop, tap counter, invalid-tap feedback"
    priority: P0
    player_visible: "player taps a cluster of 2+ same-color bubbles and they pop with animation; tap counter decrements; lone bubble tap shows wobble rejection; board locks during animation"
    features:
      - cluster-pop-mechanic
      - tap-counter-system
    cos_covered: [core-interaction, animated-dynamics, scoring]
    ux_zones:
      thumb_zone: [center]
      touch_targets: [board-cell]
      feedback_surfaces: [board, bubbles, score-hud, tap-counter-hud]
    acceptance:
      # core-interaction exit criteria
      - given: "interaction-archetype.md is written in src/game/mystery-munchies/"
        should: "document specifies: tap gesture type, pointer sequence (pointerdown→pointerup), no drag threshold, cancel behavior on pointerup without cluster, invalid-gesture feedback (wobble), and feel description (crisp + immediate)"
      - given: "player taps a group of 3 same-color connected bubbles"
        should: "all 3 bubbles dissolve with 300ms staggered animation (20ms apart, max 500ms total); score increments; tap counter decrements by 1"
      - given: "player taps a lone bubble (no orthogonal neighbor of same color)"
        should: "lone bubble plays wobble animation (~200ms horizontal oscillation); no state change; no tap consumed; visible rejection — never silent"
      - given: "player taps during pop animation (boardPhase == animating-pop)"
        should: "tap is ignored (input blocked in non-idle phases); board continues animation uninterrupted"
      # animated-dynamics: event queue
      - given: "a valid cluster of 5 bubbles is tapped"
        should: "animation events are emitted in order: cluster-matched → cells-cleared (staggered) → gravity-drop → settle → turn-complete; player sees each step, not an instant board jump"
      # tap-counter
      - given: "tap counter reaches 0 AND board is in Idle phase AND win condition is false"
        should: "boardPhase transitions to 'lost'; loss sequence begins"
      - given: "taps are consumed during tutorial level"
        should: "tap counter HUD element is not rendered (suppressed per GDD); no sentinel value visible to player"
      # canvas CoS: visual identity
      - given: "board is displayed with all 5 bubble colors"
        should: "each bubble type is distinguishable by color AND icon/emoji (not color alone — colorblind support)"
    test_loci:
      - describe: "cluster-logic: flood-fill and pop"
        file: "tests/mystery-munchies/cluster-logic.test.ts"
        cases:
          - "identifies orthogonally-connected same-color group >= 2"
          - "lone bubble returns empty cluster (size 1)"
          - "returns all members of flood-fill group"
      - describe: "game-plugin: tap action and state transitions"
        file: "tests/mystery-munchies/game-plugin-tap.test.ts"
        cases:
          - "valid tap decrements tapsRemaining"
          - "lone-bubble tap does not decrement tapsRemaining"
          - "taps ignored when boardPhase != idle"
          - "tapsRemaining 0 + idle + no-win triggers boardPhase=lost"
      - describe: "board-renderer: pop animation and wobble feedback"
        file: "tests/mystery-munchies/board-renderer-interaction.test.ts"
        cases:
          - "pop animation fires on valid tap"
          - "wobble animation fires on invalid lone-bubble tap"
          - "input is blocked during animating-pop phase"
      - describe: "interaction-archetype: document exists with required fields"
        file: "tests/mystery-munchies/interaction-archetype.test.ts"
        cases:
          - "interaction-archetype.md exists and contains required sections"
    files:
      state:
        - src/game/mystery-munchies/logic/clusterLogic.ts
        - src/game/mystery-munchies/state/GamePlugin.ts
      integration:
        - src/game/mystery-munchies/renderers/BoardRenderer.ts
        - src/game/mystery-munchies/renderers/HudRenderer.ts
        - src/game/mystery-munchies/GameController.ts
        - src/game/mystery-munchies/interaction-archetype.md
      test:
        - tests/mystery-munchies/cluster-logic.test.ts
        - tests/mystery-munchies/game-plugin-tap.test.ts
        - tests/mystery-munchies/board-renderer-interaction.test.ts
        - tests/mystery-munchies/interaction-archetype.test.ts
    how:
      - "Implement clusterLogic.ts: pure flood-fill (BFS/DFS) over orthogonal neighbors for same cellColor. Returns array of {row, col, entityId}. No Math.random(), no Pixi imports. Uses seeded RNG only when needed (not in flood-fill itself)."
      - "Add executeTap(db, {row, col, rng}) action to GamePlugin: validate cluster size ≥ 2, decrement tapsRemaining, write boardPhase=animating-pop, return {group, movements} for BoardRenderer to animate."
      - "Wire GameController pointertap handler: hit-test row/col from pixel coords → dispatch executeTap → receive animation metadata → play staggered GSAP dissolve on each bubble (300ms, staggered 20ms, max 500ms). On lone-bubble: play wobble tween (no ECS state change)."
      - "Add HudRenderer: render tap counter text in top HUD zone. Suppress rendering when tutorialMode=true."
      - "Write interaction-archetype.md in src/game/mystery-munchies/ before implementing input handler."
    risk: HIGH
    risk_reason: "Primary interaction — all downstream features depend on correct cluster detection, input blocking, and animation event queue. If boardPhase state machine is wrong, win/loss sequences, gravity fill, and power bubbles all break. Verify: 10 rapid taps confirm input queuing/ignoring behavior is correct."
    definition_of_done:
      - "acceptance[] tests go red then green"
      - "interaction-archetype.md exists with all required sections"
      - "integration call site exists: GameController pointertap → executeTap; HudRenderer receives tap-counter state"
      - "every file in files.integration is exercised by at least one acceptance test"
      - "CoS sub-walk clean: one-gesture tap, visible rejection feedback on lone bubble, input blocked during animation, event queue used (not instant state jump)"
      - "touch targets ≥ 44px per cell; wobble feedback fires within 100ms of tap"
      - "bun run build + bun run test:run pass within 3 fix cycles"

  # ═══════════════════════════════════════════════════════════════════════════
  # BATCH 4 — P0 — Gravity Fill + Scoring Formula + Level Generation
  # Completes the core loop: pop → fall → refill → score. Game becomes playable.
  # ═══════════════════════════════════════════════════════════════════════════
  - id: 4
    name: "Core loop completion — gravity fill, scoring formula, level generation"
    priority: P0
    player_visible: "after a cluster pops, remaining bubbles fall downward naturally with physics; score increments with visual delta animation; levels 1–3 load with hand-crafted layouts; one level is completable"
    features:
      - gravity-fill
      - scoring-formula
      - level-generation
      - game-state-signals
    cos_covered: [core-interaction, animated-dynamics, scoring]
    ux_zones:
      thumb_zone: [center]
      touch_targets: [board-cell]
      feedback_surfaces: [board, bubbles, score-hud]
    acceptance:
      # gravity-fill
      - given: "a cluster of 4 bubbles is popped, leaving 3 empty cells in a column"
        should: "bubbles above the empty cells animate downward using their stable entity IDs (same entity repositioned, not destroyed+created); animation uses power2.out easing (250ms per row of fall); only moved bubbles play fall animation (board-diff principle)"
      - given: "refillEnabled=true for the level and a column height drops below 3"
        should: "new bubbles cascade from the top (150ms each, staggered 30ms); they enter the world via fade-in+drop (not instant appearance)"
      - given: "refillEnabled=false"
        should: "no new bubbles appear from the top; empty cells remain empty"
      # scoring-formula — multiplicative dimensions (CoS scoring exit criteria)
      - given: "a cluster of size 3 is popped at chain depth 1"
        should: "score delta = (3 * popBasePts) * 1 (chain multiplier) — visible as a delta animation on the HUD"
      - given: "a cluster of size 5 is popped at chain depth 2 (chain reaction)"
        should: "score delta = (5 * popBasePts) * 2 — demonstrably higher than depth-1 equivalent; multiplicative spread confirmed"
      - given: "a skilled player clears the board in minimum taps vs a beginner using all taps on the same level"
        should: "skilled player score is >= 3x beginner score on the same level (wide spread confirms CoS scoring requirement)"
      # level-generation
      - given: "levelGenerator generates level-001 (hand-crafted)"
        should: "loaded grid has 8 columns, 10 rows, tapLimit in range [12..30], and at least one cluster of size ≥ 2 (solvable)"
      - given: "solvabilityChecker runs against a hand-crafted level"
        should: "returns true; at least one valid tap sequence exists to clear all non-blocker cells"
      - given: "level pool for chapter 1 contains 5 levels"
        should: "pool.length (5) >= sessionDrawCount (1 per session) — content sufficiency satisfied"
      - given: "seeded procedural level (L16+) is generated with seed = (16 * 73856093) XOR (1 * 19349663)"
        should: "level is reproducible (same seed same grid); no Math.random() used"
    test_loci:
      - describe: "gravity-logic: board-diff and fall animation"
        file: "tests/mystery-munchies/gravity-logic.test.ts"
        cases:
          - "bubbles above empty cells fall to fill them (stable identity)"
          - "only moved entities play fall animation (board-diff)"
          - "refill spawns at top when column < 3 and refillEnabled=true"
          - "no refill when refillEnabled=false"
      - describe: "scoring-logic: multiplicative formula"
        file: "tests/mystery-munchies/scoring-logic.test.ts"
        cases:
          - "size-3 cluster at depth-1 produces correct delta"
          - "size-5 cluster at depth-2 produces correct delta"
          - "skilled vs beginner score ratio >= 3x on same level"
      - describe: "level-generator: schema and solvability"
        file: "tests/mystery-munchies/level-generator.test.ts"
        cases:
          - "level-001 loads with 8 cols, 10 rows, tapLimit in range"
          - "solvabilityChecker returns true for level-001"
          - "pool.length >= sessionDrawCount for chapter 1"
          - "procedural level reproducible from seed"
    files:
      state:
        - src/game/mystery-munchies/logic/gravityLogic.ts
        - src/game/mystery-munchies/logic/scoringLogic.ts
        - src/game/mystery-munchies/logic/levelGenerator.ts
        - src/game/mystery-munchies/logic/solvabilityChecker.ts
        - src/game/mystery-munchies/data/levels/hand-crafted/level-001.json
        - src/game/mystery-munchies/data/levels/hand-crafted/level-002.json
        - src/game/mystery-munchies/data/levels/hand-crafted/level-003.json
        - src/game/mystery-munchies/data/difficultyTable.ts
        - src/game/mystery-munchies/state/GamePlugin.ts
        - src/game/state.ts
      integration:
        - src/game/mystery-munchies/renderers/BoardRenderer.ts
        - src/game/mystery-munchies/renderers/HudRenderer.ts
        - src/game/mystery-munchies/GameController.ts
      test:
        - tests/mystery-munchies/gravity-logic.test.ts
        - tests/mystery-munchies/scoring-logic.test.ts
        - tests/mystery-munchies/level-generator.test.ts
    how:
      - "gravityLogic.ts: pure function computeGravityDrop(board) returns {moved: [{entityId, fromRow, toRow, col, distance}], spawned: [{entityId, row, col, color}]}. Stable identity principle: reuse entity IDs. Board-diff: only entities in moved[] play fall animations."
      - "scoringLogic.ts: score = clusterSize * popBasePts * (chainDepth + 1). Export computeScore(clusterSize, chainDepth, tuning) as pure function. Chain depth tracked in ECS resource."
      - "levelGenerator.ts: export generateLevel(levelNumber, chapterNumber, rng?) → LevelConfig. For L1–15: load from hand-crafted JSON. For L16+: 7-step seeded procedural (seed = (n * 73856093) XOR (c * 19349663)). solvabilityChecker.ts: greedy BFS simulation; retry up to 10 attempts with seed+attempt offset before falling back to blocker reduction."
      - "Extend GamePlugin.ts addScore transaction + addChainDepth. bridgeEcsToSignals extension: wire score → gameState.setScore; tapsRemaining → gameState.setTapsRemaining."
    risk: MEDIUM
    risk_reason: "Level generation retry logic and solvability check are complex. Wrong seeded RNG breaks reproducibility. Board-diff must key by entityId not grid position or animated-dynamics CoS fails. Verify: run solvabilityChecker on all 3 hand-crafted levels in tests."
    definition_of_done:
      - "acceptance[] tests go red then green"
      - "integration call site exists: BoardRenderer handles gravity drop events; HudRenderer shows score delta"
      - "every file in files.integration is exercised by at least one acceptance test"
      - "CoS sub-walk clean: gravity uses acceleration easing, stable identity used in board-diff, multiplicative scoring with ≥ 2 dimensions, score spread ≥ 3x skilled/beginner"
      - "level-001.json through level-003.json present and solvable"
      - "no Math.random() in any logic file (seeded Mulberry32 RNG only)"
      - "bun run build + bun run test:run pass within 3 fix cycles"

  # ═══════════════════════════════════════════════════════════════════════════
  # BATCH 5 — P0 — Win/Loss Sequences + Star Rating + Results Screen
  # Completes the loop: win → stars → results screen; loss → results screen.
  # ═══════════════════════════════════════════════════════════════════════════
  - id: 5
    name: "Win and loss sequences + star rating + results screen"
    priority: P0
    player_visible: "clearing all bubbles triggers a 10-step win animation sequence ending at the results screen with stars; running out of taps triggers an 8-step loss sequence; results screen shows win/loss branches with correct copy (no 'Game Over')"
    features:
      - win-loss-sequences
      - star-rating
      - results-screen-conflict
      - results-screen-infra
    cos_covered: [animated-dynamics, core-interaction, canvas, scoring]
    ux_zones:
      thumb_zone: [center bottom]
      touch_targets: [next-level-btn, retry-btn, play-again-btn]
      feedback_surfaces: [board, companion-sprite, mystery-meter, clue-layer, star-display, results-overlay]
    acceptance:
      # win sequence
      - given: "all non-blocker cells are cleared (clearedCells == totalNonBlockerCells)"
        should: "boardPhase transitions to 'won'; 10-step win sequence fires in strict order: mystery-meter-fill → clue-reveal → star-1-animate (200ms) → star-2-animate (200ms) → star-3-animate (200ms) → scooby-victory → board-dim → score-tally → Level-Complete-overlay → Next-Level button"
      - given: "win sequence is playing"
        should: "input is blocked; no tap registers on the board"
      # loss sequence
      - given: "tapsRemaining reaches 0 in Idle phase without win"
        should: "boardPhase transitions to 'lost'; 8-step loss sequence fires: board-lock → scooby-sad → mystery-meter-partial → partial-clue-30pct-opacity → loss-screen-slides-up → option-1-stagger (Watch Ad) → option-2-stagger (+5 Snacks) → option-3-stagger (Try Again) — all staggered 100ms each"
      - given: "loss screen is displayed"
        should: "copy reads Shaggy's 'Zoinks! We almost had it!' — never 'Game Over' or 'You Lose'"
      - given: "Watch Ad button is tapped on loss screen"
        should: "button responds with 'Coming Soon' toast (not disabled, not silent — honest absent-feature UX per q-continue-system-ad-integration decision)"
      # star rating
      - given: "player wins with tapsRemaining >= starThresholds.three"
        should: "starsEarned = 3; 3 star sprites animate staggered"
      - given: "player wins with tapsRemaining between starThresholds.two and starThresholds.three"
        should: "starsEarned = 2"
      - given: "player wins with tapsRemaining < starThresholds.two"
        should: "starsEarned = 1 (minimum win award)"
      # results screen copy (collision-resolved:results-copy)
      - given: "results screen mounts after a win"
        should: "title shows 'Mystery Solved!' or level-complete equivalent — not 'Game Over'"
      - given: "results screen mounts after a loss"
        should: "Shaggy line 'Zoinks! We almost had it!' is shown; 'Next Level' is absent; three recovery options are shown"
    test_loci:
      - describe: "win-loss: sequence ordering and boardPhase transitions"
        file: "tests/mystery-munchies/win-loss-sequences.test.ts"
        cases:
          - "win: clearedCells==totalNonBlockerCells triggers boardPhase=won"
          - "win: 10-step sequence fires in correct order"
          - "loss: tapsRemaining=0 + idle triggers boardPhase=lost"
          - "loss: loss sequence fires in 8 steps with 100ms stagger"
          - "Watch-Ad button responds with Coming-Soon UX"
      - describe: "star-logic: threshold calculation"
        file: "tests/mystery-munchies/star-logic.test.ts"
        cases:
          - "3 stars when tapsRemaining >= threshold.three"
          - "2 stars when tapsRemaining >= threshold.two"
          - "1 star for any other win"
      - describe: "results-screen: copy and branching"
        file: "tests/mystery-munchies/results-screen.test.ts"
        cases:
          - "win branch shows no 'Game Over' text"
          - "loss branch shows Shaggy line copy"
          - "loss branch shows three recovery options"
    files:
      state:
        - src/game/mystery-munchies/logic/starLogic.ts
        - src/game/mystery-munchies/state/GamePlugin.ts
      integration:
        - src/game/mystery-munchies/GameController.ts
        - src/game/mystery-munchies/renderers/BoardRenderer.ts
        - src/game/mystery-munchies/renderers/HudRenderer.ts
        - src/game/screens/ResultsScreen.tsx
      test:
        - tests/mystery-munchies/win-loss-sequences.test.ts
        - tests/mystery-munchies/star-logic.test.ts
        - tests/mystery-munchies/results-screen.test.ts
    how:
      - "starLogic.ts: pure function computeStars(tapsRemaining, thresholds) → 1|2|3. Exported from state layer."
      - "Add win/loss detection in GamePlugin action executeTap: after gravity resolves, check clearedCells==totalNonBlockerCells (win) or tapsRemaining==0+idle (loss). Write boardPhase accordingly."
      - "GameController: watch boardPhase changes via ECS observe; dispatch win or loss sequence as async GSAP timeline. Loss: snapshot ECS board state before entering Lost (needed for continuation path). Win sequence uses strict 10-step ordered array of Promise-based animations."
      - "ResultsScreen.tsx: replace hardcoded 'Game Over' with win/loss branch. Win branch: stars display, Next Level button. Loss branch: Shaggy copy, three recovery option buttons. Watch Ad button dispatches callback that shows 'Coming Soon' toast."
    risk: MEDIUM
    risk_reason: "Strictly ordered 8–10-step animation sequences across multiple renderers; any out-of-order step breaks the perceived win feel. Board state snapshot for loss continuation must happen before Lost state ECS commit. Verify: manually trace both win and loss sequence step lists against GDD before coding."
    definition_of_done:
      - "acceptance[] tests go red then green"
      - "integration call site exists: GameController.init() wires boardPhase observer; ResultsScreen.tsx reads starsEarned and boardPhase via signals"
      - "every file in files.integration is exercised by at least one acceptance test"
      - "CoS sub-walk clean: every transition animated, input blocked during sequences, staggered star animation, no Game-Over copy"
      - "touch targets ≥ 44px on all buttons; primary actions (Next Level, Try Again) in bottom thumb zone"
      - "bun run build + bun run test:run pass within 3 fix cycles"

